
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denzix AI Banking Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="../css/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="text-white font-sans">

<main class="md:ml-72 pt-24 px-4 md:px-8 pb-10 bg-slate-50 min-h-screen">

    <!-- HEADER -->

    <div class="mb-8">

        <h1 class="text-3xl font-black text-slate-800">
            Transfer Funds
        </h1>

        <p class="text-slate-500 mt-2">
            Send money securely to any bank account in Nigeria.
        </p>

    </div>

    <div class="grid xl:grid-cols-3 gap-6">

        <!-- TRANSFER FORM -->

        <div class="xl:col-span-2">

            <div class="bg-white rounded-3xl shadow-lg border text-slate-800 border-slate-200 p-6">

                <!-- SOURCE ACCOUNT -->

                <h2 class="font-bold text-slate-800 text-lg mb-5">
                    Source Account
                </h2>

                <div class="space-y-5">

                    <div>

                        <label class="block mb-2 font-medium text-slate-700">
                            Select Account
                        </label>

                        <select
                            class="w-full p-4 rounded-2xl text-sm border border-slate-300 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 outline-none overflow-hidden">

                            <option>
                                0045994837 (Savings)
                            </option>

                            <option>
                                0056823912 (Current)
                            </option>

                        </select>

                    </div>
                </div>

                <!-- BENEFICIARY -->

                <h2 class="font-bold text-slate-800 text-lg mt-10 mb-5">
                    Beneficiary Details
                </h2>

                <div class="grid md:grid-cols-2 gap-5">

                    <div>

                        <label class="block mb-2 font-medium text-slate-700">
                            Destination Bank
                        </label>

                        <select
                            class="w-full p-4 text-sm rounded-2xl border border-slate-300 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 outline-none">

                            <option>Select Bank</option>
                            <option>Access Bank</option>
                            <option>Moniepoint MFB</option>
                            <option>Opay</option>
                            <option>GTBank</option>
                            <option>UBA</option>

                        </select>

                    </div>

                    <div>

                        <label class="block mb-2 font-medium text-slate-700">
                            Account Number
                        </label>

                        <input
                            type="text"
                            maxlength="10"
                            placeholder="Enter Account Number"
                            class="w-full p-4 rounded-2xl border border-slate-300 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 outline-none">

                    </div>

                </div>

                <!-- ACCOUNT NAME -->

                <div
                    class="mt-5 border border-green-200 rounded-2xl p-4">

                    <span class="font-semibold">
                        Beneficiary Name:
                    </span>

                    <span class="font-bold">
                        JULIET AHIAOMA
                    </span>

                </div>

                <!-- TRANSFER DETAILS -->

                <h2 class="font-bold text-slate-800 text-lg mt-10 mb-5">
                    Transfer Details
                </h2>

                <div class="grid md:grid-cols-2 gap-5">

                    <div>

                        <label class="block mb-2 font-medium">
                            Amount
                        </label>

                        <input
                            type="number"
                            placeholder="₦0.00"
                            class="w-full p-4 rounded-2xl border border-slate-300 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 outline-none">

                    </div>

                    <div>

                        <label class="block mb-2 font-medium">
                            Transfer Type
                        </label>

                        <select
                            class="w-full p-4 rounded-2xl border border-slate-300">

                            <option>Instant Transfer</option>
                            <option>Scheduled Transfer</option>

                        </select>

                    </div>

                </div>

                <!-- DESCRIPTION -->

                <div class="mt-5">

                    <label class="block mb-2 font-medium">
                        Description / Narration
                    </label>

                    <textarea
                        rows="3"
                        placeholder="Purpose of transfer..."
                        class="w-full p-4 rounded-2xl text-slate-800 border border-slate-300 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 outline-none"></textarea>

                </div>

                <!-- SAVE BENEFICIARY -->

                <div class="mt-5">

                    <label class="flex items-center gap-3">

                        <input type="checkbox">

                        <span>
                            Save Beneficiary For Future Transfers
                        </span>

                    </label>

                </div>

                <!-- ACTION -->

                <button
                    class="w-full mt-8 py-4 rounded-2xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold text-lg hover:shadow-xl hover:scale-[1.01] transition-all">

                    Proceed Transfer

                </button>

            </div>

        </div>
        </div>

    </div>

</main>
</body>
</html>
